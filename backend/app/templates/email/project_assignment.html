<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Project assignment</title></head>
<body style="font-family:sans-serif;color:#333;max-width:520px;margin:0 auto;padding:24px">
  <h2 style="color:#1a1a2e">You've been assigned to a project</h2>
  <p>{{ greeting }}</p>
  <p><strong>{{ assigned_by_name }}</strong> has assigned you to <strong>{{ project_name }}</strong> on Strata.</p>
  <p>Your role on this project: <strong>{{ role }}</strong></p>
  <p style="margin:24px 0">
    <a href="{{ app_url }}"
       style="background:#534AB7;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:500">
      Open Strata
    </a>
  </p>
  <p style="color:#666;font-size:13px">Log in to see the project and get started.</p>
  <hr style="border:none;border-top:1px solid #eee;margin-top:32px">
  <p style="color:#999;font-size:12px">Strata · Construction QMS</p>
</body>
</html>
